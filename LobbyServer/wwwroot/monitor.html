<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JStars Server Monitor</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1419;
      --card: #1a2332;
      --border: #2d3a4f;
      --text: #e7ecf3;
      --muted: #8b9bb4;
      --accent: #4f8cff;
      --ok: #3ddc97;
      --warn: #ffb020;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }
    h1 { margin: 0 0 8px; font-size: 1.5rem; }
    .sub { color: var(--muted); margin-bottom: 20px; font-size: 0.9rem; }
    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 20px;
      align-items: center;
    }
    input, button {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 0.9rem;
    }
    button {
      cursor: pointer;
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
    }
    .card .label { color: var(--muted); font-size: 0.85rem; margin-bottom: 8px; }
    .card .value { font-size: 2rem; font-weight: 700; line-height: 1; }
    .card .hint { color: var(--muted); font-size: 0.75rem; margin-top: 8px; }
    .card .value.ok-text { color: var(--ok); }
    .card .value.err-text { color: #ff6b6b; }
    .card .value.small { font-size: 1.25rem; }
    .status { font-size: 0.85rem; margin-top: 12px; }
    .status.ok { color: var(--ok); }
    .status.err { color: #ff6b6b; }
    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    th, td {
      text-align: left;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }
    th { color: var(--muted); font-weight: 600; font-size: 0.85rem; }
    tr:last-child td { border-bottom: none; }
  </style>
</head>
<body>
  <h1>JStars Server Monitor</h1>
  <p class="sub">로비 SignalR · 매칭 · 필드서버 · Redis · 랭킹</p>

  <div class="toolbar">
    <input id="apiKey" type="password" placeholder="Monitoring API Key (선택)" style="min-width: 220px;" />
    <button id="refreshBtn">새로고침</button>
    <label style="color: var(--muted); font-size: 0.9rem;">
      <input id="autoRefresh" type="checkbox" checked /> 5초 자동 갱신
    </label>
  </div>

  <div class="grid">
    <div class="card"><div class="label">SignalR 연결</div><div class="value" id="signalR">-</div></div>
    <div class="card"><div class="label">로그인 세션 토큰</div><div class="value" id="authTokens">-</div></div>
    <div class="card"><div class="label">PVP 매칭 대기</div><div class="value" id="pvpQueue">-</div></div>
    <div class="card"><div class="label">PVE 매칭 대기</div><div class="value" id="pveQueue">-</div></div>
    <div class="card"><div class="label">필드서버 총 인원</div><div class="value" id="fieldTotal">-</div></div>
    <div class="card"><div class="label">Redis</div><div class="value" id="redisStatus">-</div></div>
    <div class="card">
      <div class="label">매칭 E2E 평균 대기</div>
      <div class="value" id="matchLatency">-</div>
      <div class="hint" id="matchLatencyHint">성공 MatchSuccess 기준 (누적)</div>
    </div>
    <div class="card">
      <div class="label">PVP 랭킹 마지막 갱신</div>
      <div class="value small" id="rankingRefresh">-</div>
    </div>
  </div>

  <table>
    <thead>
      <tr><th>필드서버</th><th>인원</th></tr>
    </thead>
    <tbody id="fieldServersBody">
      <tr><td colspan="2" style="color: var(--muted);">데이터 없음</td></tr>
    </tbody>
  </table>

  <p class="status" id="status">대기 중...</p>

  <script>
    const apiKeyInput = document.getElementById("apiKey");
    const refreshBtn = document.getElementById("refreshBtn");
    const autoRefresh = document.getElementById("autoRefresh");
    const statusEl = document.getElementById("status");

    const params = new URLSearchParams(location.search);
    const savedKey = localStorage.getItem("monitorApiKey") || params.get("key") || "";
    apiKeyInput.value = savedKey;

    let timer = null;

    function setStatus(text, ok) {
      statusEl.textContent = text;
      statusEl.className = "status " + (ok ? "ok" : "err");
    }

    async function fetchSummary() {
      refreshBtn.disabled = true;
      const key = apiKeyInput.value.trim();
      if (key) localStorage.setItem("monitorApiKey", key);

      const headers = {};
      if (key) headers["X-Monitor-Key"] = key;

      try {
        const res = await fetch("/api/monitor/summary", { headers });
        if (!res.ok) throw new Error("HTTP " + res.status);

        const data = await res.json();
        document.getElementById("signalR").textContent = data.signalRConnections;
        document.getElementById("authTokens").textContent = data.authTokens;
        document.getElementById("pvpQueue").textContent = data.pvpMatchingQueue;
        document.getElementById("pveQueue").textContent = data.pveMatchingQueue;
        document.getElementById("fieldTotal").textContent = data.fieldServerTotalUsers;

        const redisEl = document.getElementById("redisStatus");
        if (data.redisConnected) {
          redisEl.textContent = "Connected";
          redisEl.className = "value ok-text";
        } else {
          redisEl.textContent = "Disconnected";
          redisEl.className = "value err-text";
        }

        const latencyEl = document.getElementById("matchLatency");
        const latencyHint = document.getElementById("matchLatencyHint");
        if (data.matchLatencyAverageMs != null && data.matchLatencySampleCount > 0) {
          latencyEl.textContent = Math.round(data.matchLatencyAverageMs) + " ms";
          latencyHint.textContent = "샘플 " + data.matchLatencySampleCount + "건 (취소·실패 제외)";
        } else {
          latencyEl.textContent = "-";
          latencyHint.textContent = "아직 집계 없음 (MatchSuccess 전송 후 누적)";
        }

        const rankingEl = document.getElementById("rankingRefresh");
        if (data.rankingLastRefreshedUtc) {
          rankingEl.textContent = new Date(data.rankingLastRefreshedUtc).toLocaleString();
        } else {
          rankingEl.textContent = "미갱신";
        }

        const tbody = document.getElementById("fieldServersBody");
        tbody.innerHTML = "";
        const servers = data.fieldServers || [];
        if (servers.length === 0) {
          tbody.innerHTML = '<tr><td colspan="2" style="color: var(--muted);">등록된 필드서버 없음</td></tr>';
        } else {
          for (const s of servers) {
            const tr = document.createElement("tr");
            tr.innerHTML = `<td>${s.serverName}</td><td>${s.userCount}</td>`;
            tbody.appendChild(tr);
          }
        }

        const ts = new Date(data.timestampUtc).toLocaleString();
        setStatus("마지막 갱신: " + ts, true);
      } catch (e) {
        setStatus("조회 실패: " + e.message, false);
      } finally {
        refreshBtn.disabled = false;
      }
    }

    function resetTimer() {
      if (timer) clearInterval(timer);
      if (autoRefresh.checked) timer = setInterval(fetchSummary, 5000);
    }

    refreshBtn.addEventListener("click", fetchSummary);
    autoRefresh.addEventListener("change", resetTimer);
    apiKeyInput.addEventListener("change", () => {
      const key = apiKeyInput.value.trim();
      if (key) localStorage.setItem("monitorApiKey", key);
    });

    fetchSummary();
    resetTimer();
  </script>
</body>
</html>
